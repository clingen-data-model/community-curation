title: ClinGen Volunteer Application
showProgressBar: top
pages:
    - name: introduction
      elements:
          - type: html
            name: intro_html
            html: |
                <p>Thank you for your interest in volunteering as a curator for ClinGen.</p>
                <p style="font-weight:bold">
                    NOTE: If you have already taken this survey and wish to add another curation activity or training,
                    please email <a href="mailto:volunteer@clinicalgenome.org">volunteer@clinicalgenome.org</a>.
                    DO NOT RETAKE THIS SURVEY!
                </p>
                <p>
                    Please tell us more about your interests, expertise, and desired level of involvement so we can
                    pair you with an appropriate curation activity and/or Curation Group.</p><p>Background training
                    within your assigned curation activity will be provided. These training sessions are held quarterly.
                    Once you submit this form, you will be added to the list to be notified of the next training session(s).
                </p>
                <p>
                    <em>
                        Please be aware that Expert Panels may require review of a CV and/or specific skill sets before
                        acceptance. Completion of training or a volunteer survey is not a guarantee of placement. There are
                        limited openings, and once the capacity has been reached, you may be asked to participate in one of
                        ClinGen's other curation activities. For questions, contact
                        <a href="mailto:volunteer@clinicalgenome.org">volunteer@clinicalgenome.org</a>.
                    </em>
                </p>
    - name: demographic
      title: Demographic Questions
      elements:
          - type: text
            name: first_name
            title: First Name
            isRequired: true
            placeholder: First
          - type: text
            name: last_name
            title: Last Name
            isRequired: true
            placeholder: Last
            startWithNewLine: false
          - type: text
            name: institution
            title: Institution
            isRequired: true
          - type: text
            name: orcid_id
            title: "If you have an ORCID ID, please provide it:"
          - type: panel
            name: address_panel
            title: Address
            elements:
                - type: text
                  name: street1
                  title: Street
                - type: text
                  name: street2
                  title: Street 2
                - type: text
                  name: city
                  title: City
                - type: text
                  name: state
                  title: State
                  startWithNewLine: false
                - type: text
                  name: zip
                  title: Zip
                  startWithNewLine: false
                - type: dropdown
                  name: country_id
                  title: Country
                  isRequired: true
                  startWithNewLine: false
                  choicesByUrl:
                      url: /api/surveys/choices/countries
                      valueName: id
                      titleName: name
          - type: text
            name: email
            title: Email address
            isRequired: true
            inputType: email
            validators:
                - type: email
          - type: dropdown
            name: timezone
            title: Which city is closest to you?
            description: This will help us determine your time zone.
            isRequired: true
            choicesByUrl:
                url: /api/surveys/choices/timezones
                valueName: id
                titleName: name
          - type: text
            name: hypothesis_id
            title: 'If you have a <a href="https://hypothes.is" target="hypothes.is">hypothes.is</a> account, please enter your <a href="https://hypothes.is" target="hypothes.is">hypothes.is</a> username:'
          - type: html
            name: hr_separator
            html: <hr>
          - type: radiogroup
            name: already_clingen_member
            title: Are you currently a member of a ClinGen expert panel?
            isRequired: true
            choices:
                - value: 0
                  text: No
                - value: 1
                  text: Yes
          - type: tagbox
            name: already_member_cgs
            title: In which expert panels are you currently a member? (Check all that apply)
            visibleIf: "{already_clingen_member} = 1"
            choicesByUrl:
                url: /api/surveys/choices/curation-groups
                valueName: id
                titleName: name
    - name: education
      title: Education Certification and Demographics Questions
      elements:
          - !include questions/highest_education.1.yaml
          - type: comment
            name: adv_cert
            title: "If you have an advanced genetic certification or fellowship (i.e. CGC or FACMG), please indicate:"
          - !include questions/self_description.1.yaml
          - !include questions/race_group.1.yaml
    - name: outreach
      title: Outreach and Motivation Questions
      elements:
          - type: checkbox
            name: ad_campaign
            title: How did you find out about the ClinGen volunteer efforts? (Check all that apply)
            isRequired: true
            choicesByUrl:
                url: /api/surveys/choices/ad-campaigns
                valueName: id
                titleName: name
            choices:
                - value: 100
                  text: Other
          - type: text
            name: ad_campaign_other_detail
            title: "Please specify:"
            visibleIf: "{ad_campaign} contains 100"
            requiredIf: "{ad_campaign} contains 100"
          - type: checkbox
            name: motivation
            title: What motivated you to volunteer in ClinGen curation efforts? (Check all that apply)
            isRequired: true
            choicesByUrl:
                url: /api/surveys/choices/motivations
                valueName: id
                titleName: name
            choices:
                - value: 100
                  text: Other
          - type: text
            name: motivation_other_detail
            title: "Please specify:"
            visibleIf: "{motivation} contains 100"
            requiredIf: "{motivation} contains 100"
          - type: checkbox
            name: goals
            title: What would you like to accomplish by volunteering with ClinGen? Do you have any specific goals? (Check all that apply)
            choicesByUrl:
                url: /api/surveys/choices/goals
                valueName: id
                titleName: name
            choices:
                - value: 100
                  text: Other
          - type: text
            name: goals_other_detail
            title: "Please specify:"
            visibleIf: "{goals} contains 100"
            requiredIf: "{goals} contains 100"
          - type: checkbox
            name: interests
            title: Are there any genes and/or disease areas you are particularly interested in? (Check all that apply)
            choicesByUrl:
                url: /api/surveys/choices/interests
                valueName: id
                titleName: name
    - name: commitment
      title: Level of Commitment
      visibleIf: "{custom_survey_id} empty"
      elements:
          - type: html
            name: commitment_table_html
            html: |
                <p>
                  There are two levels at which you can volunteer: <strong>Baseline</strong> and
                  <strong>Comprehensive</strong>. Please review the table below and decide what level of
                  commitment is right for you.
                </p>
                <table class="table table-bordered">
                  <thead><tr><th></th><th>Baseline</th><th>Comprehensive</th></tr></thead>
                  <tbody>
                    <tr><td><strong>Training</strong></td><td>Online training modules</td><td>Online training modules + live training sessions</td></tr>
                    <tr><td><strong>Curation Group Membership</strong></td><td>No</td><td>Yes - assigned to a curation group</td></tr>
                    <tr><td><strong>Time Commitment</strong></td><td>Flexible</td><td>8-10 hours/month</td></tr>
                    <tr><td><strong>Duration</strong></td><td>Flexible</td><td>Minimum 1 year</td></tr>
                  </tbody>
                </table>'
          - type: radiogroup
            name: volunteer_type
            title: "Please select your preferred level of commitment:"
            isRequired: true
            choices:
                - value: 1
                  text: Baseline
                - value: 2
                  text: Comprehensive
          - type: text
            name: notes
            visible: false
          - type: text
            name: imported_survey_data
            visible: false
    - !include pages/priorities.1.yaml
